<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Skill Curator hero image</title>
  <desc id="desc">A visual summary of skill discovery, scoring, installation, and governance for Codex Agent Skills.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="0.46" stop-color="#102A43"/>
      <stop offset="1" stop-color="#1B4332"/>
    </linearGradient>
    <linearGradient id="accent" x1="150" y1="90" x2="1080" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.48" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#020617" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <path d="M81 326C219 220 342 375 486 278C621 187 683 70 829 125C958 174 1015 312 1128 225" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  <g opacity="0.16">
    <circle cx="180" cy="92" r="84" fill="#38BDF8"/>
    <circle cx="1045" cy="329" r="98" fill="#22C55E"/>
    <circle cx="774" cy="60" r="62" fill="#F59E0B"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="70" y="72" width="470" height="276" rx="22" fill="#F8FAFC"/>
    <rect x="92" y="98" width="86" height="28" rx="14" fill="#DBEAFE"/>
    <text x="108" y="118" fill="#1D4ED8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">CODEX SKILL</text>
    <text x="92" y="168" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="46" font-weight="800">GitHub Skill</text>
    <text x="92" y="218" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="46" font-weight="800">Curator</text>
    <text x="94" y="258" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Find, score, install, audit, and prune</text>
    <text x="94" y="285" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Agent Skills without prompt clutter.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="632" y="76" width="436" height="272" rx="22" fill="#0F172A" fill-opacity="0.88" stroke="#334155"/>
    <g transform="translate(666 110)">
      <rect width="152" height="48" rx="13" fill="#082F49" stroke="#38BDF8"/>
      <text x="24" y="31" fill="#E0F2FE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Discover</text>
      <path d="M166 24H203" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
      <rect x="216" width="152" height="48" rx="13" fill="#14532D" stroke="#22C55E"/>
      <text x="251" y="31" fill="#DCFCE7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Score</text>
