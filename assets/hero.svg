      <text x="40" y="31" fill="#FEF3C7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Install</text>
      <path d="M166 24H203" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
      <rect x="216" width="152" height="48" rx="13" fill="#4C0519" stroke="#FB7185"/>
      <text x="257" y="31" fill="#FFE4E6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Audit</text>
    </g>
    <text x="666" y="298" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Govern the skill lifecycle with evidence, policy, and safety checks.</text>
